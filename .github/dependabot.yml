version: 2
updates:
  # Python dependencies (desktop + Pi requirement sets live at the repo root).
  # Monthly to keep PR churn low; everything lands in one grouped PR.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      python-dependencies:
        patterns:
          - "*"
    # Major bumps of these packages carry breaking API/ABI changes (Dash 2->4,
    # numpy 1->2, pandas 2->3, etc.) and must be done deliberately with full
    # local + Pi testing, never auto-merged. Minor/patch updates still flow.
    ignore:
      - dependency-name: "dash"
        update-types: ["version-update:semver-major"]
      - dependency-name: "dash-bootstrap-components"
        update-types: ["version-update:semver-major"]
      - dependency-name: "dash-cytoscape"
        update-types: ["version-update:semver-major"]
      - dependency-name: "plotly"
        update-types: ["version-update:semver-major"]
      - dependency-name: "numpy"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pandas"
        update-types: ["version-update:semver-major"]
      - dependency-name: "scikit-learn"
        update-types: ["version-update:semver-major"]
      - dependency-name: "webauthn"
        update-types: ["version-update:semver-major"]

  # GitHub Actions used by the CI / image-build workflows.
  # Grouped so all action bumps arrive as a single PR, not one per action.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    groups:
      github-actions:
        patterns:
          - "*"
