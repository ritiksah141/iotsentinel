name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_call:        # allow other workflows (e.g. the Pi image build) to gate on this

# Cancel superseded runs on a PR branch when new commits arrive; never cancel
# on main, where every commit must be validated.
concurrency:
  # Static prefix (not github.workflow): when called by build-pi-image, github.workflow
  # is the caller's name, which would collide with the pi-deps reusable call and cancel
  # the build on a tag ref. A literal keeps each gate in its own group.
  group: test-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: pytest on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # build-only deps exercised by the setup-guide generator test
          pip install --quiet markdown pillow

      # Guarantee a Chrome is present so the headless render gate
      # (tests/test_browser_render.py) actually runs instead of skipping; Selenium
      # Manager resolves the matching chromedriver automatically.
      - name: Set up Chrome (headless render gate)
        uses: browser-actions/setup-chrome@v2
        with:
          install-dependencies: true

      - name: Initialise database
        run: python config/init_database.py </dev/null

      - name: Run tests with coverage
        run: |
          pytest tests/ -q --tb=short \
            --cov=. --cov-report=term-missing --cov-report=xml

      # Boots the real Dash app and confirms it serves /login. Unit tests pass
      # even when a major UI-dependency bump (Dash/plotly/dbc) breaks rendering;
      # this step fails loudly on that class of breakage.
      - name: App boot smoke test
        env:
          IOTSENTINEL_DEBUG: "true"   # lets SocketIO use the Werkzeug dev server
          IOTSENTINEL_PORT: "8050"
        run: |
          python dashboard/app.py > /tmp/app-boot.log 2>&1 &
          APP_PID=$!
          ok=0
          # HTTPS is the default (self-signed cert -> -k); fall back to HTTP if a
          # build disables it. Either scheme serving /login proves the app booted.
          for i in $(seq 1 40); do
            if curl -fsSk https://127.0.0.1:8050/login >/dev/null 2>&1 \
               || curl -fsS http://127.0.0.1:8050/login >/dev/null 2>&1; then ok=1; break; fi
            sleep 1
          done
          kill "$APP_PID" 2>/dev/null || true
          if [ "$ok" -ne 1 ]; then
            echo "::error::App did not serve /login within 40s"
            tail -40 /tmp/app-boot.log
            exit 1
          fi
          echo "App booted and served /login."

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
