name: Build Raspberry Pi Image

# Triggered on version tag push (e.g., v1.0.0) or manually from GitHub Actions UI
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to embed in the image filename (e.g. v1.0.0)'
        required: false
        default: 'v1.0.0-dev'

# Allow read access to contents and write access to release uploads
permissions:
  contents: write

jobs:
  # Gate: the image is only built if the full test suite passes on the tagged commit.
  test:
    uses: ./.github/workflows/test.yml

  # Gate: and only if the Pi requirement set installs cleanly on ARM64.
  pi-deps:
    uses: ./.github/workflows/pi-deps.yml

  build-pi-image:
    name: Build ARM64 .img.xz
    needs: [test, pi-deps]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout IoTSentinel
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # needed so git describe can find the tag

      - name: Install build prerequisites
        # pi-gen's full native dependency set (its build.sh dependency check fails
        # otherwise), plus binfmt-support for the ARM64 emulation registration.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            coreutils quilt parted qemu-user-static debootstrap zerofree zip \
            dosfstools libarchive-tools libcap2-bin grep rsync xz-utils file \
            git curl bc gpg pigz xxd arch-test binfmt-support kpartx fdisk gawk

      - name: Register ARM64 binfmt handler
        run: |
          sudo update-binfmts --enable
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Clone pi-gen
        run: |
          git clone --depth 1 https://github.com/RPi-Distro/pi-gen.git ../pi-gen

      - name: Build image
        env:
          # On a tag push use the tag name; on a manual run use the dispatch input.
          # (github.ref_name is the short name, so it is never 'refs/heads/main';
          # ref_type distinguishes a tag build from a branch/dispatch build.)
          TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          PIGEN_DIR: ${{ github.workspace }}/../pi-gen
        run: |
          bash scripts/build_pi_image.sh --tag="${TAG}" --pigen-dir="${PIGEN_DIR}"

      # Ship a non-technical, end-to-end setup guide INSIDE the download so users never
      # have to come back to GitHub. Self-contained HTML (pure-stdlib generator).
      - name: Generate the shipped setup guide (HTML)
        run: |
          # markdown: required (pure-Python, renders the guide at build time so the
          # HTML is fully offline). pillow: optional, just shrinks the embedded
          # screenshots so the self-contained file stays small.
          python3 -m pip install --quiet markdown
          python3 -m pip install --quiet pillow || true
          python3 scripts/build_setup_guide_html.py deploy/IoTSentinel-Setup-Guide.html

      # Always publish the image as a workflow artifact. For a manual (workflow_dispatch)
      # build this is the ONLY output: download it from the run page, flash it, and test
      # on the Pi privately. Nothing is published to a public release.
      - name: Upload image as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: pi-image
          path: |
            deploy/IoTSentinel-*.img.xz
            deploy/IoTSentinel-*.img.xz.sha256
            deploy/IoTSentinel-Setup-Guide.html
          if-no-files-found: error
          retention-days: 14

      # Publish to a public GitHub Release ONLY on a real version-tag push, after the
      # Pi hardware test has passed and you cut the release tag.
      - name: Upload image to GitHub Release
        if: github.ref_type == 'tag'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          IMGFILE="deploy/IoTSentinel-${TAG}.img.xz"
          SHAFILE="${IMGFILE}.sha256"
          GUIDE="deploy/IoTSentinel-Setup-Guide.html"
          gh release upload "${TAG}" "${IMGFILE}" "${SHAFILE}" "${GUIDE}" \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pi-image-build-log
          path: deploy/build.log
          if-no-files-found: ignore
