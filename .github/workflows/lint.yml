name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel superseded runs on a PR branch when new commits arrive; never cancel
# on main, where every commit must be validated.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      # Gating check: the high-signal correctness rules from pyproject.toml.
      - name: ruff check
        run: ruff check .

      # Advisory: surface formatting drift without failing the build.
      - name: ruff format (advisory)
        run: ruff format --check --diff .
        continue-on-error: true
